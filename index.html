<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="BoniStudio is an AI-native studio building products, games, and interactive worlds."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Share+Tech&display=swap"
      rel="stylesheet"
    />
    <title>BoniStudio | AI-native products, games, and interactive worlds</title>
    <style>
      html {
        background: #050607;
      }

      body {
        min-width: 320px;
        margin: 0;
        color: #eff7f5;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px) 0 0 / 96px 96px,
          linear-gradient(0deg, rgba(255, 255, 255, 0.026) 1px, transparent 1px) 0 0 / 96px 96px,
          #050607;
        font-family:
          "Share Tech", "Noto Sans SC", "IBM Plex Sans", "Helvetica Neue", Arial, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .app-fallback {
        display: grid;
        min-height: 100svh;
        padding: 34px clamp(18px, 4vw, 64px);
        place-items: center;
        text-align: center;
        background:
          radial-gradient(circle at 50% 45%, rgba(102, 249, 255, 0.16), transparent 35%),
          linear-gradient(180deg, rgba(5, 6, 7, 0.3), rgba(5, 6, 7, 0.96) 92%);
      }

      .app-fallback h1 {
        margin: 0;
        font-size: clamp(4.4rem, 13vw, 10.8rem);
        font-family:
          "Share Tech", "Noto Sans SC", "IBM Plex Sans", "Helvetica Neue", Arial, system-ui, sans-serif;
        font-weight: 400;
        letter-spacing: 0;
        line-height: 0.86;
        text-transform: uppercase;
        background: linear-gradient(180deg, #ffffff 0%, #d7fffb 34%, #7bf8ff 54%, #eff7f5 78%);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow:
          0 0 1px rgba(255, 255, 255, 0.7),
          0 0 18px rgba(102, 249, 255, 0.26),
          0 0 64px rgba(102, 249, 255, 0.16);
      }

      .app-fallback p {
        max-width: 760px;
        margin: 28px auto 0;
        color: rgba(239, 247, 245, 0.82);
        font-size: clamp(1.05rem, 2.4vw, 1.7rem);
        line-height: 1.35;
      }

      .app-static {
        min-height: 100svh;
        padding: 24px clamp(18px, 5vw, 72px) 42px;
        background:
          radial-gradient(circle at 78% 22%, rgba(0, 229, 255, 0.12), transparent 30%),
          radial-gradient(circle at 16% 72%, rgba(168, 85, 247, 0.1), transparent 28%),
          linear-gradient(90deg, rgba(255, 255, 255, 0.026) 1px, transparent 1px) 0 0 / 86px 86px,
          linear-gradient(0deg, rgba(255, 255, 255, 0.022) 1px, transparent 1px) 0 0 / 86px 86px,
          #050608;
      }

      .app-static__header,
      .app-static__footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        max-width: 1180px;
        margin: 0 auto;
      }

      .app-static__brand {
        color: #f6fbfa;
        font-family: "Share Tech", "Noto Sans SC", system-ui, sans-serif;
        font-size: 1.1rem;
      }

      .app-static__brand span:first-child {
        color: #00e5ff;
      }

      .app-static__brand span:last-child {
        color: #a855f7;
      }

      .app-static__nav {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        color: rgba(246, 251, 250, 0.68);
        font-size: 0.88rem;
      }

      .app-static__hero {
        display: grid;
        max-width: 1180px;
        min-height: 62svh;
        align-content: center;
        margin: 0 auto;
        padding: clamp(72px, 12vw, 140px) 0 52px;
      }

      .app-static__hero p:first-child {
        margin: 0;
        color: #00e5ff;
        font-family: "SFMono-Regular", Consolas, monospace;
        font-size: 0.76rem;
        text-transform: uppercase;
      }

      .app-static__hero h1 {
        max-width: 900px;
        margin: 18px 0 0;
        color: #f6fbfa;
        font-family: "Share Tech", "Noto Sans SC", system-ui, sans-serif;
        font-size: clamp(4rem, 13vw, 9rem);
        font-weight: 400;
        line-height: 0.88;
      }

      .app-static__hero h1 span:first-child {
        color: #00e5ff;
      }

      .app-static__hero h1 span:last-child {
        color: #a855f7;
      }

      .app-static__hero p:last-child {
        max-width: 700px;
        margin: 26px 0 0;
        color: rgba(246, 251, 250, 0.76);
        font-size: clamp(1.05rem, 2vw, 1.45rem);
        line-height: 1.45;
      }

      .app-static__grid {
        display: grid;
        max-width: 1180px;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin: 0 auto 54px;
      }

      .app-static__grid article {
        border: 1px solid rgba(246, 251, 250, 0.12);
        border-radius: 8px;
        padding: 18px;
        background: rgba(8, 10, 13, 0.78);
      }

      .app-static__grid h2 {
        margin: 0;
        color: #f6fbfa;
        font-family: "Share Tech", "Noto Sans SC", system-ui, sans-serif;
        font-size: 1.45rem;
        font-weight: 400;
      }

      .app-static__grid p {
        margin: 12px 0 0;
        color: rgba(246, 251, 250, 0.64);
        line-height: 1.55;
      }

      .app-static__footer {
        border-top: 1px solid rgba(246, 251, 250, 0.12);
        padding-top: 18px;
        color: rgba(246, 251, 250, 0.56);
      }

      @media (max-width: 760px) {
        .app-static__header,
        .app-static__footer {
          align-items: flex-start;
          flex-direction: column;
        }

        .app-static__grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="app-fallback" aria-labelledby="fallback-title">
        <div>
          <h1 id="fallback-title">BoniStudio</h1>
          <p>Loading the AI-native studio interface.</p>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.setTimeout(function () {
        if (document.querySelector('.site-header')) {
          return;
        }

        var root = document.getElementById('root');
        if (!root) {
          return;
        }

        root.innerHTML = [
          '<main class="app-static" aria-labelledby="static-title">',
          '<header class="app-static__header">',
          '<div class="app-static__brand"><span>B</span>oni<span>S</span>tudio</div>',
          '<nav class="app-static__nav" aria-label="Fallback navigation">',
          '<a href="#static-projects">Projects</a>',
          '<a href="#static-pipeline">Pipeline</a>',
          '<a href="mailto:bonistudio.core@gmail.com">Contact</a>',
          '</nav>',
          '</header>',
          '<section class="app-static__hero">',
          '<p>AI-native studio / fallback interface</p>',
          '<h1 id="static-title"><span>B</span>oni<span>S</span>tudio</h1>',
          '<p>AI-native products, games, and interactive worlds. The core site is loading a lighter static interface because the app bundle did not start.</p>',
          '</section>',
          '<section class="app-static__grid" id="static-projects">',
          '<article><h2>AI Products</h2><p>Tools and workflows shaped around real product behavior.</p></article>',
          '<article><h2>Mobile Apps</h2><p>Focused app experiments with clear loops and tactile polish.</p></article>',
          '<article><h2>Games</h2><p>Play systems, prototypes, and expressive digital toys.</p></article>',
          '<article><h2>Interactive Worlds</h2><p>Spatial interfaces, VR concepts, and living archives.</p></article>',
          '</section>',
          '<section class="app-static__grid" id="static-pipeline">',
          '<article><h2>Pipeline</h2><p>Idea -> GPT -> Claude -> Codex -> Build -> Deploy -> Users.</p></article>',
          '<article><h2>Projects</h2><p>OvO Cyber Beads, AtMyTable, Space Station / VR Game, HC Pet Fashion, and BoniStudio Website.</p></article>',
          '</section>',
          '<footer class="app-static__footer">',
          '<span>Building the future, one product at a time.</span>',
          '<a href="mailto:bonistudio.core@gmail.com">bonistudio.core@gmail.com</a>',
          '</footer>',
          '</main>',
        ].join('');
      }, 1200);
    </script>
  </body>
</html>
